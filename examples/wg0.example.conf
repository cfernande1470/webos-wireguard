# Example WireGuard client configuration for webOS WireGuard
# Copy this file, rename it to wg0.conf, and replace all placeholder values.
#
# Do NOT commit your real wg0.conf.
# It contains your private key and private VPN details.

[Interface]
PrivateKey = REPLACE_WITH_CLIENT_PRIVATE_KEY
Address = 10.10.10.2/32

[Peer]
PublicKey = REPLACE_WITH_SERVER_PUBLIC_KEY

# Optional. Uncomment only if your server uses a preshared key.
# PresharedKey = REPLACE_WITH_PRESHARED_KEY

# Full tunnel: route all IPv4 traffic through the VPN.
AllowedIPs = 0.0.0.0/0

# Split tunnel example:
# AllowedIPs = 10.10.10.0/24, 192.168.100.0/24

Endpoint = vpn.example.invalid:51820
PersistentKeepalive = 25
